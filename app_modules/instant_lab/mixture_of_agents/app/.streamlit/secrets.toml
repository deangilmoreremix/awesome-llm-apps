# .streamlit/secrets.toml
# Copy this file to each app's .streamlit/secrets.toml or use as base template

# OpenAI API Key (used by many apps)
OPENAI_API_KEY = "your-openai-key"

# Google API Key (used by Gemini-powered apps)
GOOGLE_API_KEY = "your-google-key"

# Anthropic API Key (used by Claude-powered apps)
ANTHROPIC_API_KEY = "your-anthropic-key"

# SerpAPI Key (used by travel agent and research apps for web search)
SERPAPI_API_KEY = "your-serpapi-key"

# GitHub Token (used by GitHub MCP agent)
GITHUB_TOKEN = "your-github-token"

# Notion Token (used by Notion MCP agent)
NOTION_TOKEN = "your-notion-token"

# Gemini API Key (alternative for Google AI apps)
GEMINI_API_KEY = "your-gemini-key"

# xAI API Key (used by xAI finance agent)
XAI_API_KEY = "your-xai-key"

# Optional: Firecrawl API Key (for advanced web scraping)
FIRECRAWL_API_KEY = "your-firecrawl-key"

# Optional: Browserbase API Key (for browser automation)
BROWSERBASE_API_KEY = "your-browserbase-key"